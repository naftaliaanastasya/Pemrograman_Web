<!DOCTYPE html>
<html>
    <head>
        <title>2473028-Naftalia Anastasya Rombe</title>
        <style>
            .container{
                position: relative;
                width: 600px;
                height: 250px;
                margin: 50px auto;
            }
            .circle{
                position: absolute;
                width: 200px;
                height: 200px;
            }
            .circle img{
                width: 100%;
                padding: 5px; 
            }

            .kiri{
                left: 0;
                top: 0;
                z-index: 1;
            }

            .tengah{
                left: 150px;
                top: 0;
                z-index: 2;
            }

            .kanan{
                left: 300px;
                top: 0;
                z-index: 1;
            }

            .half-kiri{
                left: 0;
                top: 0;
                z-index: 3;
            }

            .half-kanan{
                left: 300px;
                top: 0;
                z-index: 3;
            }
      
        </style>
    </head>

        <body>
            <div class="container">

                <div class="circle kiri">
                    <img src="src/circle-red.png">
                </div>

                <div class="circle half-kiri">
                    <img src="src/circle-red-half.png">
                </div>

                <div class="circle tengah">
                    <img src="src/circle-purple.png">
                </div>

                <div class="circle kanan">
                    <img src="src/circle-red.png">
                </div>

                <div class="circle half-kanan">
                    <img src="src/circle-red-half.png">
                </div>

            </div>
        </body>
</html>
