<!DOCTYPE html>
<html>
    <head>
        <title>2473028-Naftalia Anastasya Rombe</title>
        <style>
            body{
                background: white;
                font-family: Arial;
            }

        table{
            margin:auto;
            margin-top:50px;
        }

        td{
            text-align:center;
            padding:30px;
        }

        a{
            position: relative;
            display: inline-block;
        }

        a img{
            display: block;
            padding: 10px;
        }

        a::before,
        a::after,
        a span::before,
        a span::after{
            content: "";
            position: absolute;
            width: 30px;
            height: 30px;
            border: 6px solid #FF0000;
        }

        a::before{
            top: 0;
            left: 0;
            border-right: none;
            border-bottom: none;
        }

        a span::before{
            top: 0;
            right: 0;
            border-left: none;
            border-bottom: none;
        }

        a span::after{
            bottom: 0;
            left: 0;
            border-right: none;
            border-top: none;
        }

        a::after{
            bottom: 0;
            right: 0;
            border-left: none;
            border-top: none;
        }

        a:hover::before,
        a:hover::after,
        a:hover span::before,
        a:hover span::after{
            border-color: #FF00FF;
        }

        .arrow{
            font-weight:bold;
            color:blue;
            font-size:20px;
        }
        </style>
    </head>
    
    <body>
        <table>
            <tr>

            <td>
            <a href="#">
                <span></span>
                <img src="src/star.jpg" width="150">
            </a>
            </td>

            <td class="arrow">
            Mouse Over →
            </td>

            <td>
            <a href="#">
                <span></span>
                <img src="src/star.jpg" width="150">
            </a>
            </td>

            </tr>
            </table>
    </body>    
</html>
