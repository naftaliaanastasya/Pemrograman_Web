<!DOCTYPE html>
<html>
    <head>
        <title>2473028-Naftalia Anastasya Rombe</title>

        <style>
            table {
                border: 1px solid black;
                padding: 10px;
            }
            td {
                vertical-align: top;
            }
            .container {
            width: 300px;
            font-family: Arial;
            }
            textarea {
                width: 100%;
                height: 100px;
                resize: none;
            }
            .counter {
                text-align: right;
                font-size: 12px;
                color: gray;
            }
        </style>
    </head>

    <body>
        <table>
            <tr>
                <td>Judul :</td>
                <td><input type="text"></td>
            </tr>
            <tr>
                <td>Deskripsi :</td>
                <td>
                    <textarea id="deskripsi"
                        onkeyup="call_onKeyPress(this)"
                        onkeydown="call_onKeyPress(this)"></textarea>
                    <div id="counter" class="counter">0/256</div>
                </td>
            </tr>
        </table>
        
        <script>
            function call_onKeyPress(ob){
                var obval = ob.value;
                var chars = obval.split("");

                if (chars.length > 256) {
                    obval = chars.slice(0, 256).join("");
                    ob.value = obval;
                    alert("Maksimal 256 karakter!");
                }
                document.getElementById("counter").innerHTML = obval.length + "/256";
            }
        </script>
    </body>
</html>
