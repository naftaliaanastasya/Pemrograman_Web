<!DOCTYPE html>
<html>
<head>
<title> 2473028-Naftalia Anastasya Rombe</title>

<style>
table{
border:1px solid black;
border-collapse:collapse;
}

td{
border:none;
}
</style>

</head>

<body>

<form>

<table cellpadding="2" align="center" width="350">

<tr>
<td colspan="3" align="left">
<h2>From Tambah Data User</h2>
</td>
</tr>

<tr>
<td>Name</td>
<td>:<input type="text" name="nama" required
oninvalid="this.setCustomValidity('Name is required!!!')"
oninput="this.setCustomValidity('')"></td>
</tr>

<tr>
<td>Address</td>
<td>:<input type="text" name="alamat" required
oninvalid="this.setCustomValidity('Address is required!!!')"
oninput="this.setCustomValidity('')"></td>
</tr>

<tr>
<td>Email</td>
<td>:<input type="email" name="email" required>
</td>
</tr>

<tr>
<td>Home Page</td>
<td>:<input type="url" name="homepage" /></td> 
</tr>

<tr>
<td>Birthday</td>
<td>:<input type="text" placeholder="hh/bb/tttt">
</td>
</tr>

<tr>
<td>Favorit Color</td>
<td>:<input type="color" name="favcolor" />
</td>
</tr>

<tr>
<td>IPK</td>
<td>:<input type="number" name="ipk" min="0" max="4" step="0.1" value="0" /></td>
</tr>


<tr>
<td><label for="phone">Phone Number</label></td>
<td>:<input type="tel" id="phone" name="phone"
pattern="[0-9]{3}-[0-9]{7,10}"
placeholder="123-1234567"
title="Format: ###-####### sampai ###-##########">
</td>
</tr>

<tr>
<td></td>
<td align="left">
<input type="submit" value="Add"/>
 &nbsp;&nbsp;
</td>
</tr>

</table>

</form>

</body>
</html>
