<!DOCTYPE html>
<html>
<head>

<title> 2473028-Naftalia Anastasya Rombe</title>
<style>
table{
    border-collapse: collapse;
    margin: 40px auto;
}
td{
    width: 100px;
    height: 80px;
    text-align: center;
    font-weight: bold;
    color: black;
    border: 2px solid black;
}

.blue{background: blue; color:black;}
.red{background: red;}
.green{background: lime;}
.yellow{background: yellow; color:black;}
.black{background: black; color:white;}
</style>
</head>

<body>

<table border="3">

<tr>
<td colspan="4" class="blue">A</td>
<td rowspan="4" class="yellow">D</td>
</tr>

<tr>
<td rowspan="4" class="yellow">G</td>
<td colspan="2" class="red">B</td>
<td rowspan="2" class="green">C</td>
</tr>

<tr>
<td rowspan="2" class="green">F</td>
<td class="black">X</td>
</tr>

<tr>
<td colspan="2" class="red">E</td>
</tr>

<tr>
<td colspan="4" class="blue">H</td>
</tr>

</table>

</body>
</html>
